# cbindgen.toml — configuration for C header generation for the lean sidecar FFI.
#
# Generates include/loom_sidecar.h from the extern "C" surface in src/ffi.rs.
#
# Unlike the full loom-ffi, no Arrow FFI types cross the sidecar boundary —
# all functions deal only with raw byte pointers and C strings.  The generated
# header is therefore simpler: no forward declarations or Arrow struct exclusions
# are required.

language = "C"

include_guard = "LOOM_SIDECAR_H"

header = "/* Generated by cbindgen — do not edit by hand. */\n/* Loom Sidecar FFI surface — Phase 51, Plan 01 */"

# Exclude the private error enum so cbindgen doesn't emit it as a C struct.
# The C ABI uses i32 return codes; the LoomSidecarError Rust enum is opaque to C.
[export]
exclude = [
    "LoomSidecarError",
]

# Do not emit the System allocator static (it has no C-visible symbol).
[parse]
parse_deps = false
