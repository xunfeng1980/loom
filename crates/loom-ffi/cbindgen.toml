# cbindgen.toml — configuration for C header generation (CORE-03, T-01-09)
#
# Generates include/loom.h from the extern "C" surface in src/ffi.rs.
#
# Key invariant: FFI_ArrowArray and FFI_ArrowSchema must NOT be redefined here.
# Those structs are part of the Arrow C Data Interface specification and are
# already defined by the Arrow/DuckDB C++ headers.  cbindgen cannot know their
# representation from the Rust source because they are defined in the arrow-rs
# crate, not in this crate.  Excluding them prevents ABI struct-body mismatches
# on the C++ side (PITFALLS integration gotcha, T-01-09).
#
# On the C++ consumer side, the caller must include the appropriate Arrow C
# Data Interface header (e.g. from arrow-rs's own ffi.h or DuckDB's bundled
# abi/arrow.h) BEFORE including loom.h so that FFI_ArrowArray and
# FFI_ArrowSchema are already defined when the loom_decode declaration is seen.

language = "C"

# Include guard prevents double-inclusion.
include_guard = "LOOM_H"

# Add a brief header comment to the generated file.
header = "/* Generated by cbindgen — do not edit by hand. */\n/* Loom FFI surface — Phase 1, Plan 02 (CORE-03) */"

# Exclude the Arrow FFI struct bodies.  cbindgen will not emit definitions for
# these types; they are expected to be defined by the including C/C++ code via
# the Arrow C Data Interface headers.  The loom_decode declaration still uses
# them as pointer types, which is valid C (incomplete types work as pointers).
[export]
exclude = ["FFI_ArrowArray", "FFI_ArrowSchema", "LoomError"]

# Do not emit the System allocator static (it has no C-visible symbol).
[parse]
parse_deps = false
