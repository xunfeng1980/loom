[tools]
java = "temurin-21.0.8+9.0.LTS"

[env]
LOOM_EXPECTED_MLIR_MAJOR = "22"
LOOM_ALLOW_NATIVE_TOOL_SKIP = "0"

[tasks.formal-tools]
description = "Install Lean and TLC tools required by formal verifier gates"
run = "scripts/install-formal-tools.sh"

[tasks.external-tools]
description = "Install LLVM/MLIR tools required by backend; Bitwuzla is optional (evidence layer only, not production-gated)"
run = "scripts/install-external-tools.sh"

[tasks.tools]
description = "Install all managed local verification tools"
depends = ["formal-tools", "external-tools"]

[tasks.full-verifier]
description = "Run Phase 13 full-verifier gate with required formal tools"
depends = ["formal-tools"]
run = "scripts/full-verifier-test.sh"

[tasks.verify]
description = "Run the full release gate with managed required tools"
depends = ["tools"]
run = "scripts/mvp0-verify.sh"
