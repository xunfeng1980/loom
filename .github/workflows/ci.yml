# .github/workflows/ci.yml
# GitHub Actions CI workflow for Loom MVP0 (DuckDB demo).
#
# Triggers on push and pull_request to any branch.
# The workflow fails if any invariant check or build step exits nonzero.
#
# Phase 1 CORE invariants verified by this workflow (ROADMAP criterion 5):
#   CORE-01: Zero arrow-* version conflicts; vortex-file absent; loom-core clean
#   CORE-02: panic="unwind" (so catch_unwind works — CR-01) + System global_allocator present
#   CORE-03: cbindgen generates loom.h with loom_decode signature
#   ARROW-03: real Arrow array exported via to_ffi + ptr::write; release test passes
#   DUCK-04: catch_unwind on extern "C"; panic-safety test passes
#
# Phase 2 DUCK-01 / DUCK-03 invariants added in Plan 02-02:
#   - C++ extension builds with CMake (cargo-build trigger + staticlib link + footer-stamp)
#   - DuckDB v1.5.3 CLI loads the extension with -unsigned; loom_scan returns 4 rows
#   - No rogue allocator symbols in libloom_ffi.a (ROADMAP criterion 4, PITFALLS P5)
#
# The invariant script called here is: scripts/check-core-invariants.sh
# The smoke-test script is:            scripts/duckdb-smoke-test.sh

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Rust build, Clippy, unit tests, and CORE invariant checks.
  # Runs on ubuntu-latest (linux_amd64 platform).
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build, Clippy, and CORE Invariants
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository.
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Install the Rust toolchain pinned in rust-toolchain.toml.
      # dtolnay/rust-toolchain reads the channel from rust-toolchain.toml
      # automatically when no explicit `toolchain` input is given.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Let the action read the channel from rust-toolchain.toml.
          # We pass the components we need for clippy.
          components: clippy

      # Step 3: Cache Cargo registry and build artefacts for faster CI runs.
      - name: Cache Cargo artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Step 4: Build the entire workspace in release mode.
      # --no-default-features excludes melior/LLVM (JIT is offline-only;
      # the DuckDB extension uses the interpreter).
      - name: Build workspace (release)
        run: cargo build --workspace --release --no-default-features

      # Step 5: Clippy — deny warnings.
      # Applies to the whole workspace; any new warning fails the build.
      - name: Clippy
        run: cargo clippy --workspace --no-default-features -- -D warnings

      # Step 5b: Run tests under release profile (no JIT — --no-default-features).
      - name: Test loom-ffi (release, no JIT)
        run: cargo test -p loom-ffi --release --no-default-features

      # Step 6: Run the CORE invariant script.
      # This is the gate referenced by ROADMAP criterion 5:
      # "panic=abort + System allocator verified in CI".
      # The script also runs cargo test -p loom-ffi internally (ARROW-03, DUCK-04).
      # Phase 2: also guards no-rogue-allocator-symbols (ROADMAP criterion 4).
      - name: Run CORE invariant checks
        run: bash scripts/check-core-invariants.sh

      # Step 7: Install CMake for C++ extension build.
      - name: Install CMake
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake

      # Step 8: Build the C++ DuckDB extension (DUCK-01).
      # cmake -S duckdb-ext: CMAKE_SOURCE_DIR = <repo>/duckdb-ext (important for
      # the vendor/null.txt and vendor/append_metadata.cmake paths in CMakeLists.txt).
      - name: Build C++ extension
        run: |
          cmake -S contrib/duckdb-ext -B contrib/duckdb-ext/build -DCMAKE_BUILD_TYPE=Release
          cmake --build contrib/duckdb-ext/build

      # Step 9: Download DuckDB v1.5.3 CLI for linux-amd64.
      - name: Download DuckDB CLI (linux-amd64)
        run: |
          curl -fSL --retry 3 --retry-delay 2 \
            -o duckdb_cli.zip \
            https://github.com/duckdb/duckdb/releases/download/v1.5.3/duckdb_cli-linux-amd64.zip
          unzip duckdb_cli.zip
          chmod +x duckdb
          echo "DUCKDB_CLI=$(pwd)/duckdb" >> "$GITHUB_ENV"

      # Step 10: Run the DuckDB smoke-test.
      - name: DuckDB smoke-test
        run: bash scripts/duckdb-smoke-test.sh

  # ---------------------------------------------------------------------------
  # Job 2: Formal verifier gates (Lean + TLC + verifier tests).
  # ---------------------------------------------------------------------------
  formal-verifier:
    name: Formal Verifier Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build workspace (test profile)
        run: cargo build --workspace --no-default-features

      - name: Run full-verifier gate
        run: bash scripts/full-verifier-test.sh

  # ---------------------------------------------------------------------------
  # Job 3: kloom — K Framework spec-oracle differential gate.
  #
  # Installs K Framework via Nix, kompiles kloom.k, and runs krun on the
  # semantics test corpus.  This is the spec-oracle baseline for Phase A.
  # ---------------------------------------------------------------------------
  kloom:
    name: kloom Spec-Oracle (K Framework)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install K Framework
        run: |
          bash <(curl -sSL https://kframework.org/install)
          kup install k

      - name: Verify K tools
        run: |
          kompile --version
          krun --version

      - name: kompile kloom.k
        run: |
          cd contrib/kloom
          kompile src/kloom.k --backend haskell -o .build

      - name: Run kloom semantics tests
        run: |
          cd contrib/kloom
          for test in tests/semantics/*.kloom; do
            echo "=== $test ==="
            krun "$test" --definition .build --output pretty
          done

      - name: Run kloom differential gate (K vs Rust)
        run: bash contrib/kloom/scripts/kloom-diff.sh
